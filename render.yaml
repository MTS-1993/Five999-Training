services:
  - type: web
    name: five999-training-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DISCORD_TICKET_URL
        sync: false
      - key: DATABASE_URL
        sync: false
